<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vantage Narrator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-row">
        <img src="icons/icon48.png" alt="Vantage Narrator" class="logo-icon">
        <div>
          <h1>Vantage Narrator</h1>
          <span class="version">v1.0.0</span>
        </div>
      </div>
      <div id="status-indicator" class="status-dot status-inactive" title="No API key set"></div>
    </header>

    <!-- API Key Section -->
    <section class="section api-section">
      <label for="api-key-input" class="section-label">Gemini API Key</label>
      <div class="input-row">
        <input type="password" id="api-key-input" placeholder="Enter your Gemini API key..." autocomplete="off">
        <button id="save-key-btn" title="Save API Key">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
      </div>
      <p id="key-status" class="key-status"></p>
    </section>

    <div class="divider"></div>

    <!-- Feature Toggles -->
    <section class="section">
      <h2 class="section-label">Features</h2>

      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-icon">🖼️</span>
          <div>
            <span class="toggle-name">Image Describer</span>
            <span class="toggle-desc">Auto-describe images missing alt-text</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-image" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-icon">🎬</span>
          <div>
            <span class="toggle-name">Video Narrator</span>
            <span class="toggle-desc">Describe video frames on demand</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-video" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-icon">📐</span>
          <div>
            <span class="toggle-name">Spatial Summary</span>
            <span class="toggle-desc">Summarize page layout (Alt+S)</span>
          </div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-spatial" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Speech Rate -->
    <section class="section">
      <div class="slider-header">
        <label for="speech-rate" class="section-label">Speech Rate</label>
        <span id="rate-value" class="rate-value">1.0×</span>
      </div>
      <input type="range" id="speech-rate" min="0.5" max="2.0" step="0.1" value="1.0" class="rate-slider">
    </section>

    <div class="divider"></div>

    <!-- Session Stats -->
    <section class="section stats-section">
      <h2 class="section-label">This Session</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <span id="stat-images" class="stat-value">0</span>
          <span class="stat-label">Images</span>
        </div>
        <div class="stat-item">
          <span id="stat-videos" class="stat-value">0</span>
          <span class="stat-label">Videos</span>
        </div>
        <div class="stat-item">
          <span id="stat-layouts" class="stat-value">0</span>
          <span class="stat-label">Layouts</span>
        </div>
      </div>
    </section>

    <!-- Shortcuts Reference -->
    <footer class="popup-footer">
      <div class="shortcut"><kbd>Alt+D</kbd> Describe Element</div>
      <div class="shortcut"><kbd>Alt+S</kbd> Spatial Summary</div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
